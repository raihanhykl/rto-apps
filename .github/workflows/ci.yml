name: CI

on:
  pull_request:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: packages/backend

      - name: Prettier format check
        run: npx prettier --check .

      - name: ESLint (backend)
        run: npx eslint packages/backend/src/ --max-warnings=100

      - name: ESLint (frontend)
        run: npm run lint --workspace=packages/frontend

  test:
    name: Test & Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: packages/backend

      - name: TypeScript compile check (backend)
        run: npx tsc --noEmit
        working-directory: packages/backend

      - name: Run backend tests
        run: npm test --workspace=packages/backend
        env:
          NODE_ENV: test

      - name: Build backend
        run: npm run build --workspace=packages/backend
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Build frontend
        run: npm run build --workspace=packages/frontend
        env:
          NEXT_PUBLIC_API_URL: https://placeholder.example.com/api

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.base_ref == 'main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/frontend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: packages/backend

      - name: Run E2E tests
        run: npx playwright test
        working-directory: packages/frontend
        env:
          CI: true
          NEXT_PUBLIC_API_URL: http://localhost:3001/api
